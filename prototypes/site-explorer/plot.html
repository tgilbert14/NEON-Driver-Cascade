<title>The Plot — SRER_048, plant by plant</title>
<style>
  :root{--ink:#f4efe3;--panel:#0e0d0acc;--line:#ffffff26;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--serif:"Iowan Old Style",Palatino,Georgia,serif;}
  *{box-sizing:border-box}
  body{margin:0;overflow:hidden;background:#0b0b0a;font-family:var(--sans);color:var(--ink)}
  #scene{position:fixed;inset:0;z-index:0}
  #scene canvas{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}
  #ui{position:fixed;inset:0;z-index:2;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;
    padding:clamp(.8rem,3vw,1.6rem)}
  .eyebrow{font-family:var(--mono);font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:#ffffffb0;text-shadow:0 1px 6px #000a}
  .ttl{font-family:var(--serif);font-weight:600;font-size:clamp(1.5rem,4.5vw,2.4rem);line-height:1.05;margin:.15rem 0;text-shadow:0 2px 16px #000b}
  .sub{font-size:.9rem;color:#fdf8eecc;max-width:44ch;text-shadow:0 1px 10px #000a}
  .top{max-width:52ch}
  .bottom{display:flex;flex-direction:column;gap:.6rem}
  .row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;pointer-events:auto}
  .walk{font:inherit;font-size:.85rem;cursor:pointer;color:#111;background:#f4efe3;border:none;border-radius:999px;padding:.45rem 1rem;font-weight:650}
  .hint{font-family:var(--mono);font-size:.66rem;color:#ffffff99;text-shadow:0 1px 6px #000a}
  .legend{display:flex;gap:.4rem;flex-wrap:wrap;pointer-events:auto;max-width:60ch}
  .lg{font-family:var(--mono);font-size:.66rem;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:.28rem .6rem;backdrop-filter:blur(6px);display:inline-flex;align-items:center;gap:.4rem}
  .lg i{width:9px;height:9px;border-radius:2px;display:inline-block}
  #card{position:fixed;z-index:4;max-width:19rem;background:#12110dEE;border:1px solid #ffffff2a;border-left:3px solid #d98a3d;
    border-radius:12px;padding:.7rem .85rem;backdrop-filter:blur(8px);pointer-events:none;display:none;box-shadow:0 8px 30px #000a}
  #card .c-sci{font-family:var(--serif);font-style:italic;font-size:1.02rem;line-height:1.15}
  #card .c-common{font-size:.9rem;color:#fdf8ee;margin-top:.05rem}
  #card .c-meta{font-family:var(--mono);font-size:.68rem;color:#ffffffb0;margin-top:.45rem;line-height:1.5}
  #card .c-tag{color:#e0a24e}
  #card .c-dead{color:#c98a7a}
  .backlink{position:fixed;top:clamp(.8rem,3vw,1.6rem);right:clamp(.8rem,3vw,1.6rem);z-index:3;pointer-events:auto;
    font-family:var(--mono);font-size:.7rem;color:#f4efe3cc;text-decoration:none;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:.4rem .8rem;backdrop-filter:blur(6px)}
  #loading{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;background:#0b0b0a;color:#f4efe3;
    font-family:var(--serif);font-size:1.1rem;font-style:italic}
</style>
<div id="loading">Reconstructing the plot&hellip;</div>
<div id="scene"></div>
<div id="ui">
  <div class="top">
    <div class="eyebrow">The plot &middot; a real-data reconstruction</div>
    <div class="ttl">SRER_048 &mdash; plant by plant</div>
    <div class="sub" id="sub"></div>
  </div>
  <div class="bottom">
    <div class="row">
      <button class="walk" id="walkBtn" type="button">&#9654; Walk</button>
      <button class="walk" id="skyBtn" type="button" style="background:#26231d;color:#f4efe3">&#9723; Sky view</button>
      <button class="walk" id="layerBtn" type="button" style="background:#3a352b;color:#f4efe3">Ground: stylized</button>
      <span class="hint" id="hint">drag to look &middot; W A S D to move &middot; click a plant to read its tag</span>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>
<div id="card"></div>

var sky={x:0,z:0,half:(DATA.ey||40)/2+3};
function sizeOrtho(){var w=host.clientWidth||innerWidth,hh=host.clientHeight||innerHeight,asp=(w/hh)||1,hy=sky.half,hx=hy*asp;
  ortho.left=-hx;ortho.right=hx;ortho.top=hy;ortho.bottom=-hy;
  ortho.position.set(sky.x,120,sky.z); ortho.lookAt(sky.x,0,sky.z); ortho.updateProjectionMatrix();}
sizeOrtho();

// gradient sky dome
var skyU={top:{value:new THREE.Color("#a9bcc6")},bot:{value:new THREE.Color("#dcd2ba")},sun:{value:sun.position.clone().normalize()}};
scene.add(new THREE.Mesh(new THREE.SphereGeometry(320,24,14),new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,uniforms:skyU,
  vertexShader:"varying vec3 vp;void main(){vp=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",
  fragmentShader:"varying vec3 vp;uniform vec3 top;uniform vec3 bot;uniform vec3 sun;vec3 aces(vec3 x){return clamp((x*(2.51*x+0.03))/(x*(2.43*x+0.59)+0.14),0.0,1.0);}"+
  "void main(){vec3 d=normalize(vp);float h=clamp(d.y*0.5+0.5,0.0,1.0);vec3 c=mix(bot,top,smoothstep(0.0,0.75,h));"+
  "float s=max(0.0,dot(d,sun));c+=vec3(1.0,0.93,0.75)*pow(s,420.0);c+=vec3(1.0,0.86,0.62)*pow(s,9.0)*0.12;c=aces(c*1.12);gl_FragColor=vec4(c,1.0);}"})));

// ground (desert texture if provided) — a generous pad so the plot sits in open desert
var groundMat=new THREE.MeshStandardMaterial({color:new THREE.Color("#b8a480"),roughness:1});
if(GTEX){var gt=new THREE.TextureLoader().load(GTEX); gt.wrapS=gt.wrapT=THREE.RepeatWrapping; gt.repeat.set(34,34);
  if("anisotropy" in gt)gt.anisotropy=4; groundMat.map=gt; groundMat.color.setRGB(0.94,0.94,0.94);}
var gg=new THREE.PlaneGeometry(300,300,40,40); gg.rotateX(-Math.PI/2);
var gmesh=new THREE.Mesh(gg,groundMat); gmesh.receiveShadow=true; scene.add(gmesh);

// ---- real-world ground layers: NEON AOP aerial photo + LiDAR canopy-height, georeferenced over the plot ----
var GEO=null; try{GEO=JSON.parse(document.getElementById("geoLayers").textContent);}catch(e){}
var LAYER=0, drapes=[];   // 0 = stylized · 1 = aerial photo · 2 = canopy height
if(GEO&&GEO.ortho){
  var hw=GEO.hw||32, dg=new THREE.PlaneGeometry(hw*2,hw*2); dg.rotateX(-Math.PI/2);
  var drape=function(src){var tx=new THREE.TextureLoader().load(src); tx.flipY=false;  // crop is north-up/east-right
    if("anisotropy" in tx)tx.anisotropy=4; if("sRGBEncoding" in THREE)tx.encoding=THREE.sRGBEncoding;
    var mm=new THREE.MeshStandardMaterial({map:tx,roughness:1});
    var me=new THREE.Mesh(dg,mm); me.position.y=0.03; me.receiveShadow=true; me.visible=false; scene.add(me); return me;};
  drapes=[drape(GEO.ortho), drape(GEO.chm)];
}
function setLayer(n){LAYER=n; if(drapes.length){drapes[0].visible=(n===1); drapes[1].visible=(n===2);}
  layerBtn.innerHTML="Ground: "+(n===0?"stylized":n===1?"aerial photo":"canopy height");}

// plot boundary (40x40 outline, subtle)
var DX=(DATA.ex||40)/2, DY=(DATA.ey||40)/2;
var bl=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(DATA.ex+2,0.02,DATA.ey+2)),
  new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.28}));
bl.position.y=0.02; scene.add(bl);
// corner posts
var postG=new THREE.CylinderGeometry(0.05,0.05,1.4,6); postG.translate(0,0.7,0);
var postM=new THREE.MeshStandardMaterial({color:0xdad2c0,roughness:1});
[[-DX-1,-DY-1],[DX+1,-DY-1],[-DX-1,DY+1],[DX+1,DY+1]].forEach(function(c){var p=new THREE.Mesh(postG,postM);p.position.set(c[0],0,c[1]);p.castShadow=true;scene.add(p);});

// ---- plant palette + model builders ----
// Per-species colours + geometry, keyed on the real NEON taxonID. Each model is
// built from a botanical spec (growth form, size, branching, colour) so it reads
// as that actual plant. See build_plot.md for the sourced spec per species.
var SP={
  LATR2 :{fol:"#5f7030",bark:"#8a8579",soft:1},   // creosote — open olive vase
  CYLE8 :{fol:"#7c8a5e",fruit:"#c1272d",soft:1},   // Christmas cholla — thin wiry tangle
  PRVE  :{fol:"#9caf88",bark:"#5a4632",soft:1},    // velvet mesquite — feathery umbrella
  OPEN3 :{fol:"#7f9e6d"},                           // Engelmann prickly pear — flat pads
  FEWI  :{fol:"#5f8560",apex:"#d8cdae",fruit:"#f2c53d",spine:"#9c3b2a"}, // fishhook barrel
  MAGR9 :{fol:"#6f9e5f",frost:"#c7d2b4",flower:"#cf4b97"},               // Graham's pincushion
  EPTR  :{fol:"#8a9a52",bark:"#6b5a3c",soft:1},    // longleaf jointfir — green broom
  PAIN2 :{fol:"#aeb398",soft:1},                   // mariola — silver cushion
  CAGI10:{fol:"#4f6f43",flower:"#f2f0e6"}          // saguaro — fluted green column
};
var DEADCOL="#8a7d64";
function spCol(p,key){var s=SP[p.tx]||{};return s[key]||"#6f7a52";}
function mat(hex){return new THREE.MeshStandardMaterial({color:new THREE.Color(hex),roughness:1,flatShading:true});}
function matR(hex,rough){return new THREE.MeshStandardMaterial({color:new THREE.Color(hex),roughness:rough,flatShading:true});}
function ico(r){return new THREE.IcosahedronGeometry(r,0);}
// a thin tapered stem: cylinder with its base at y=0
function stemGeo(rTop,rBot,len,seg){var gm=new THREE.CylinderGeometry(rTop,rBot,len,seg||6);gm.translate(0,len/2,0);return gm;}
function rnd(seed){var a=seed>>>0;return function(){a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
var PROXYMAT=new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false,colorWrite:false});

var CANOPY=[];  // swayable foliage groups (soft-tissue plants only)
function buildPlant(p,seed){
  var g=new THREE.Group(); g.position.set(p.x,0,p.y);
  var R=rnd(seed), dead=p.status==="dead", tx=p.tx;
  var h=Math.max(0.1,p.h||0.5), cr=Math.max(0.2,p.cr||0.6);
  var fol=dead?DEADCOL:spCol(p,"fol"), bark=dead?DEADCOL:spCol(p,"bark");
  var m=mat(fol), foliage=new THREE.Group(), soft=!!(SP[tx]&&SP[tx].soft);

  if(tx==="LATR2"){                    // ── Creosote: open see-through vase of thin jointed stems, sparse olive tufts
    var stems=7+Math.floor(R()*3), bm=matR(bark,1);
    for(var i=0;i<stems;i++){
      var a=(i/stems)*6.283+R()*0.5, tilt=0.16+R()*0.32, slen=h*(0.70+R()*0.34);
      var s=new THREE.Mesh(stemGeo(cr*0.011,cr*0.028,slen,5),bm);
      s.rotation.set(Math.cos(a)*tilt,a,Math.sin(a)*tilt); s.castShadow=true; foliage.add(s);
      var tipx=Math.cos(a)*Math.sin(tilt)*slen, tipz=Math.sin(a)*Math.sin(tilt)*slen, tipy=slen*Math.cos(tilt);
      if(R()<0.5){var nd=new THREE.Mesh(ico(cr*0.026),matR("#5b564a",1));   // swollen dark node
        nd.position.set(tipx*0.5,tipy*0.5,tipz*0.5); nd.castShadow=true; foliage.add(nd);}
      if(!dead&&R()<0.78){var nb=1+(R()<0.3?1:0);                           // sparse airy olive tufts at tips (gaps show through)
        for(var b=0;b<nb;b++){var bl=new THREE.Mesh(ico(cr*(0.075+R()*0.055)),m);
          bl.position.set(tipx+(R()-0.5)*cr*0.22,tipy+R()*cr*0.08,tipz+(R()-0.5)*cr*0.22);
          bl.scale.y=1.3; bl.castShadow=true; foliage.add(bl);}}
    }
  }else if(tx==="CYLE8"){              // ── Christmas cholla: thin wiry canes + right-angle branchlets
    var canes=2+Math.floor(R()*2), rad=cr*0.02;
    var cg=stemGeo(rad*0.85,rad,1,5), bm=mat(fol);
    for(var c=0;c<canes;c++){
      var a=R()*6.283, cx=Math.cos(a)*cr*0.12, cz=Math.sin(a)*cr*0.12, yy=0, segs=2+Math.floor(R()*2);
      for(var s2=0;s2<segs;s2++){
        var seglen=h*(0.30+R()*0.22), lean=(R()-0.5)*0.6, la=a+(R()-0.5);
        var cane=new THREE.Mesh(cg,bm); cane.position.set(cx,yy,cz);
        cane.rotation.set(Math.cos(la)*lean,la,Math.sin(la)*lean); cane.scale.set(1,seglen,1); cane.castShadow=true; foliage.add(cane);
        cx+=Math.cos(la)*Math.sin(lean)*seglen; cz+=Math.sin(la)*Math.sin(lean)*seglen; yy+=seglen*Math.cos(lean);
        var nbr=1+Math.floor(R()*2);          // near-perpendicular terminal branchlets
        for(var b2=0;b2<nbr;b2++){var ba=R()*6.283, blen=h*(0.10+R()*0.14);
          var br=new THREE.Mesh(cg,bm); br.position.set(cx,yy-seglen*0.15,cz);
          br.rotation.set(Math.cos(ba)*1.35,ba,Math.sin(ba)*1.35); br.scale.set(0.9,blen,0.9); br.castShadow=true; foliage.add(br);
          if(!dead&&R()<0.5){var fr=new THREE.Mesh(ico(rad*1.8),mat(spCol(p,"fruit")));  // red winter fruit
            fr.position.set(cx+Math.cos(ba)*blen*0.6,yy-seglen*0.15+blen*0.2,cz+Math.sin(ba)*blen*0.6); foliage.add(fr);}}
      }
    }
  }else if(tx==="PRVE"){              // ── Velvet mesquite: crooked dark trunks under a broad feathery dome
    var bm=matR(bark,1), nT=h<1.1?1:2+Math.floor(R()*2), trunkH=h*0.45, tops=[];
    for(var t=0;t<nT;t++){var ta=(t/Math.max(1,nT))*6.283+R(), lean=nT>1?0.12+R()*0.14:0.04;
      var tr=new THREE.Mesh(stemGeo(0.03+h*0.015,0.05+h*0.03,trunkH,6),bm);
      tr.rotation.set(Math.cos(ta)*lean,ta,Math.sin(ta)*lean); tr.castShadow=true; g.add(tr);
      tops.push([Math.cos(ta)*Math.sin(lean)*trunkH,trunkH*Math.cos(lean),Math.sin(ta)*Math.sin(lean)*trunkH]);}
    var nbr=4+Math.floor(R()*3);        // zig-zag branches up-and-out
    for(var i=0;i<nbr;i++){var o=tops[i%tops.length], a=R()*6.283, up=0.5+R()*0.5, blen=cr*(0.22+R()*0.16);
      var br=new THREE.Mesh(stemGeo(0.02,0.035,blen,5),bm);
      br.position.set(o[0],o[1],o[2]); br.rotation.set(Math.cos(a)*(1.1-up),a,Math.sin(a)*(1.1-up)); br.castShadow=true; g.add(br);}
    if(!dead){var dome=5+Math.floor(R()*4);   // broad shallow umbrella, wider than tall, trunk kept visible
      for(var i=0;i<dome;i++){var a=R()*6.283, rr=cr*0.30*(0.3+R());
        var bl=new THREE.Mesh(ico(cr*(0.22+R()*0.14)),m);
        bl.position.set(Math.cos(a)*rr,trunkH+cr*0.12+R()*cr*0.14,Math.sin(a)*rr); bl.scale.set(1,0.6,1); bl.castShadow=true; foliage.add(bl);}}
  }else if(tx==="OPEN3"){            // ── Engelmann prickly pear: mounding clump of flat pads fanning up & out
    var padG=new THREE.BoxGeometry(1,1,1), pw=cr*0.36, ph2=cr*0.44, base=3+Math.floor(R()*2);
    function pad(x,y,z,yaw,tiltUp){var pd=new THREE.Mesh(padG,m);
      pd.position.set(x,y,z); pd.rotation.set(0,yaw,tiltUp); pd.scale.set(pw,ph2,cr*0.06); pd.castShadow=true; foliage.add(pd);
      return [x+Math.sin(yaw)*0.0,y+Math.cos(tiltUp)*ph2*0.5,z];}
    var bases=[];
    for(var i=0;i<base;i++){var a=(i/base)*6.283+R()*0.4, rr=cr*0.12;
      bases.push([pad(Math.cos(a)*rr,ph2*0.5,Math.sin(a)*rr,a,(R()-0.5)*0.3),a]);}
    var upper=6+Math.floor(R()*4);
    for(var i=0;i<upper;i++){var pr=bases[i%bases.length], top=pr[0], a=pr[1]+(R()-0.5)*1.4;
      pad(top[0]+(R()-0.5)*cr*0.1,top[1]+ph2*(0.2+R()*0.3),top[2]+(R()-0.5)*cr*0.1,a,(0.5+R()*0.5)*(R()<0.5?1:-1));}
  }else if(tx==="FEWI"){            // ── Fishhook barrel: ribbed keg leaning south, woolly apex, fruit ring
    var bodyH=Math.max(h,cr*0.9), rr=cr*0.5;
    var body=new THREE.Mesh(stemGeo(rr*0.9,rr,bodyH,12),m); body.castShadow=true; foliage.add(body);
    var apex=new THREE.Mesh(new THREE.SphereGeometry(rr*0.86,12,6,0,6.283,0,1.1),mat(dead?DEADCOL:spCol(p,"apex")));
    apex.position.y=bodyH; apex.castShadow=true; foliage.add(apex);
    if(!dead){var ring=8;                     // crown ring of yellow fruit
      for(var i=0;i<ring;i++){var a=(i/ring)*6.283;var f=new THREE.Mesh(ico(rr*0.13),mat(spCol(p,"fruit")));
        f.position.set(Math.cos(a)*rr*0.6,bodyH+rr*0.14,Math.sin(a)*rr*0.6); foliage.add(f);}
      var sm=mat(spCol(p,"spine"));           // a few reddish hooked central spines on the south face
      for(var i=0;i<4;i++){var a=-1.0+(i-1.5)*0.4;var sp=new THREE.Mesh(stemGeo(0.004,0.01,bodyH*0.5,4),sm);
        sp.position.set(Math.cos(a)*rr,bodyH*(0.45+R()*0.3),Math.sin(a)*rr); sp.rotation.set(1.15,a,0); foliage.add(sp);}}
    foliage.rotation.z=0.22+R()*0.10;         // the "compass barrel" southward lean
  }else if(tx==="MAGR9"){          // ── Graham's pincushion: tiny frosted ball + pink flower halo
    var rr=Math.max(0.05,cr*0.5);
    var body=new THREE.Mesh(ico(rr),mat(dead?DEADCOL:spCol(p,"frost"))); body.position.y=rr*0.85; body.scale.y=0.9; body.castShadow=true; foliage.add(body);
    if(!dead){var fh=7;for(var i=0;i<fh;i++){var a=(i/fh)*6.283;var fl=new THREE.Mesh(ico(rr*0.16),mat(spCol(p,"flower")));
      fl.position.set(Math.cos(a)*rr*0.55,rr*1.5,Math.sin(a)*rr*0.55); foliage.add(fl);}}
  }else if(tx==="EPTR"){           // ── Longleaf jointfir: airy broom of thin erect green rods, three-forked
    var n=9+Math.floor(R()*5), rad=Math.max(0.008,cr*0.02);
    var knot=new THREE.Mesh(ico(cr*0.09),matR(bark,1)); knot.position.y=cr*0.05; knot.castShadow=true; g.add(knot);
    for(var i=0;i<n;i++){var a=R()*6.283, rr=cr*0.14*R(), tilt=0.08+R()*0.34, slen=h*(0.7+R()*0.4);
      var s=new THREE.Mesh(stemGeo(rad*0.6,rad,slen,4),m);
      s.position.set(Math.cos(a)*rr,0,Math.sin(a)*rr); s.rotation.set(Math.cos(a)*tilt,a,Math.sin(a)*tilt); s.castShadow=true; foliage.add(s);
      if(R()<0.4){for(var f=0;f<2;f++){var fa=a+(f?0.4:-0.4), flen=slen*0.4;
        var fk=new THREE.Mesh(stemGeo(rad*0.5,rad*0.7,flen,4),m);
        fk.position.set(Math.cos(a)*rr+Math.cos(fa)*Math.sin(tilt)*slen*0.7,slen*0.7*Math.cos(tilt),Math.sin(a)*rr+Math.sin(fa)*Math.sin(tilt)*slen*0.7);
        fk.rotation.set(Math.cos(fa)*(tilt+0.3),fa,Math.sin(fa)*(tilt+0.3)); foliage.add(fk);}}}
  }else if(tx==="PAIN2"){          // ── Mariola: low dense silvery-grey cushion
    var rr=cr*0.44;
    var dome=new THREE.Mesh(ico(rr),m); dome.position.y=rr*0.62; dome.scale.set(1.18,0.72,1.18); dome.castShadow=true; foliage.add(dome);
    var bumps=5+Math.floor(R()*3);
    for(var i=0;i<bumps;i++){var a=R()*6.283, br2=rr*0.6*R();
      var bp=new THREE.Mesh(ico(rr*(0.30+R()*0.16)),m);
      bp.position.set(Math.cos(a)*br2,rr*(0.55+R()*0.35),Math.sin(a)*br2); bp.scale.y=0.7; bp.castShadow=true; foliage.add(bp);}
  }else if(tx==="CAGI10"){         // ── Saguaro: tall fluted green column (juveniles armless), arms if tall
    var rr=Math.max(0.06,cr*0.42), colH=h;
    var col=new THREE.Mesh(stemGeo(rr*0.85,rr,colH,12),m); col.castShadow=true; foliage.add(col);
    var domeTop=new THREE.Mesh(new THREE.SphereGeometry(rr*0.85,12,6,0,6.283,0,1.4),m); domeTop.position.y=colH; domeTop.castShadow=true; foliage.add(domeTop);
    if(h>3){var arms=1+Math.floor(R()*3);      // upcurving arms only on mature giants
      for(var i=0;i<arms;i++){var a=R()*6.283, ay=colH*(0.5+R()*0.25), al=colH*0.28;
        var e=new THREE.Mesh(stemGeo(rr*0.6,rr*0.65,al,10),m); e.position.set(0,ay,0); e.rotation.set(0,a,1.1); e.castShadow=true; foliage.add(e);
        var ex=Math.cos(a)*al*0.7, ez=Math.sin(a)*al*0.7;
        var up=new THREE.Mesh(stemGeo(rr*0.55,rr*0.6,al*1.1,10),m); up.position.set(ex,ay+al*0.2,ez); up.castShadow=true; foliage.add(up);
        var ad=new THREE.Mesh(new THREE.SphereGeometry(rr*0.55,10,5,0,6.283,0,1.4),m); ad.position.set(ex,ay+al*0.2+al*1.1,ez); foliage.add(ad);}}
  }else{                            // fallback low mound
    var b=new THREE.Mesh(ico(cr*0.4),m); b.position.y=h*0.35; b.scale.set(1.2,0.7,1.2); b.castShadow=true; foliage.add(b);
  }

  g.add(foliage);
  // transparent pick proxy so every plant — even thin cacti — is reliably clickable
  var pr=Math.max(0.28,cr*0.5), ph=Math.max(0.35,h);
  var proxy=new THREE.Mesh(new THREE.CylinderGeometry(pr,pr,ph,6),PROXYMAT); proxy.position.y=ph/2; g.add(proxy);
  // ground marker — species-coloured dot; reads as a survey dot-map from the sky cam
  var mk=new THREE.Mesh(new THREE.CircleGeometry(Math.max(0.3,cr*0.46),14),
    new THREE.MeshBasicMaterial({color:new THREE.Color(fol),transparent:true,opacity:0.62,depthWrite:false}));
  mk.rotation.x=-Math.PI/2; mk.position.y=0.04; g.add(mk);
  g.userData={p:p,foliage:foliage};
  if(!dead&&soft)CANOPY.push(foliage);       // only soft-tissue plants sway
  return g;
}

var plants=[], seedbase=1;
DATA.plants.forEach(function(p){var g=buildPlant(p,seedbase++); scene.add(g); plants.push(g);});

// ---- controls (first-person walk + top-down sky cam) ----
var MODE="walk";
var keys={},yaw=0.0,pitch=-0.05,px=0,pz=((DATA.ey||40)/2+4),walking=false,drag=false,lx=0,ly=0,moved=0,downx=0,downy=0;
window.addEventListener("keydown",function(e){keys[e.code]=true;});
window.addEventListener("keyup",function(e){keys[e.code]=false;});
var cv=renderer.domElement;
cv.addEventListener("pointerdown",function(e){drag=true;moved=0;lx=e.clientX;ly=e.clientY;downx=e.clientX;downy=e.clientY;cv.setPointerCapture&&cv.setPointerCapture(e.pointerId);});
cv.addEventListener("pointerup",function(e){drag=false; if(moved<6)pick(e);});
cv.addEventListener("pointercancel",function(){drag=false;});
cv.addEventListener("pointermove",function(e){if(!drag)return;var dx=e.clientX-lx,dy=e.clientY-ly;moved+=Math.abs(dx)+Math.abs(dy);
  if(MODE==="sky"){var r=cv.getBoundingClientRect(),wpp=(ortho.right-ortho.left)/r.width;
    sky.x=Math.max(-70,Math.min(70,sky.x-dx*wpp)); sky.z=Math.max(-70,Math.min(70,sky.z-dy*wpp)); sizeOrtho();}
  else{yaw-=dx*0.004;pitch-=dy*0.004;pitch=Math.max(-1.2,Math.min(0.5,pitch));}
  lx=e.clientX;ly=e.clientY;});
cv.addEventListener("wheel",function(e){if(MODE!=="sky")return;e.preventDefault();
  sky.half=Math.max(4,Math.min(60,sky.half*(1+(e.deltaY>0?1:-1)*0.12))); sizeOrtho();},{passive:false});
var walkBtn=document.getElementById("walkBtn"), skyBtn=document.getElementById("skyBtn"), hintEl=document.getElementById("hint"), layerBtn=document.getElementById("layerBtn");
walkBtn.addEventListener("click",function(){walking=!walking;walkBtn.innerHTML=walking?"&#10074;&#10074; Stop":"&#9654; Walk";});
if(GEO&&GEO.ortho){layerBtn.addEventListener("click",function(){setLayer((LAYER+1)%3);});}else{layerBtn.style.display="none";}
function setMode(mode){MODE=mode;walking=false;walkBtn.innerHTML="&#9654; Walk";
  if(mode==="sky"){scene.fog=null;sky.x=0;sky.z=0;sky.half=(DATA.ey||40)/2+3;sizeOrtho();
    skyBtn.innerHTML="&#9654; Enter the plot";walkBtn.style.display="none";
    hintEl.innerHTML="top-down &middot; drag to pan &middot; scroll to zoom &middot; click a plant to read its tag";}
  else{scene.fog=SKYFOG;skyBtn.innerHTML="&#9723; Sky view";walkBtn.style.display="";
    hintEl.innerHTML="drag to look &middot; W A S D to move &middot; click a plant to read its tag";}}
skyBtn.addEventListener("click",function(){setMode(MODE==="sky"?"walk":"sky");});

// ---- pick / inspect ----
var ray=new THREE.Raycaster(), card=document.getElementById("card"), reduce=window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches;
function pick(e){
  var r=cv.getBoundingClientRect();
  var nx=((e.clientX-r.left)/r.width)*2-1, ny=-((e.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera({x:nx,y:ny},MODE==="sky"?ortho:camera);
  var hit=ray.intersectObjects(plants,true)[0];
  if(!hit){card.style.display="none";return;}
  var o=hit.object; while(o&&!(o.userData&&o.userData.p))o=o.parent;
  if(!o){card.style.display="none";return;}
  var p=o.userData.p, dead=p.status==="dead";
  card.innerHTML='<div class="c-sci">'+p.sci+'</div>'+(p.common?'<div class="c-common">'+p.common+'</div>':'')+
    '<div class="c-meta"><span class="c-tag">NEON.PLA…'+p.id+'</span> · tagged '+(p.date||'').slice(0,4)+
    '<br>height '+(p.realh?p.h+' m (measured)':'~'+p.h+' m (typical)')+' · crown '+p.cr+' m'+
    '<br>'+(dead?'<span class="c-dead">standing dead</span>':'live')+' · '+p.tx+'</div>';
  card.style.display="block";
  var cw=card.offsetWidth,chh=card.offsetHeight;
  card.style.left=Math.min(window.innerWidth-cw-12,Math.max(12,e.clientX+14))+"px";
  card.style.top=Math.min(window.innerHeight-chh-12,Math.max(12,e.clientY+14))+"px";
}

// ---- legend ----
var lg=document.getElementById("legend");
DATA.legend.slice(0,9).forEach(function(l){var d=document.createElement("span");d.className="lg";
  d.innerHTML='<i style="background:'+((SP[l.tx]&&SP[l.tx].fol)||"#6f7a52")+'"></i>'+(l.common||l.tx)+' ×'+l.n;lg.appendChild(d);});

// ---- loop ----
function resize(){var w=host.clientWidth||innerWidth,h=host.clientHeight||innerHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();sizeOrtho();}
addEventListener("resize",resize);resize();
var last=0;
function loop(t){requestAnimationFrame(loop);
  var dt=Math.min(0.05,((t-last)/1000)||0);last=t;
  if(!reduce){var gz=Math.sin(t*0.0006)*0.02+Math.sin(t*0.0013)*0.01;
    for(var i=0;i<CANOPY.length;i++)CANOPY[i].rotation.z=gz;}
  if(MODE==="sky"){
    sun.position.set(sky.x+28,60,sky.z+16); sun.target.position.set(sky.x,0,sky.z); sun.target.updateMatrixWorld();
    renderer.render(scene,ortho); return;
  }
  var spd=9*dt,mf=0,ms=0;
  if(keys.KeyW||keys.ArrowUp)mf+=1;if(keys.KeyS||keys.ArrowDown)mf-=1;
  if(keys.KeyA||keys.ArrowLeft)ms-=1;if(keys.KeyD||keys.ArrowRight)ms+=1;
  if(walking)mf+=1;
  var sy=Math.sin(yaw),cy=Math.cos(yaw);
  px+=(-sy*mf+cy*ms)*spd; pz+=(-cy*mf-sy*ms)*spd;
  var L=70; px=Math.max(-L,Math.min(L,px)); pz=Math.max(-L,Math.min(L,pz));
  var bob=(!reduce&&(mf||ms))?Math.sin(t*0.009)*0.04:0;
  camera.position.set(px,1.6+bob,pz); camera.rotation.set(pitch,yaw,0);
  sun.position.set(px+28,44,pz+16); sun.target.position.set(px,0,pz); sun.target.updateMatrixWorld();
  renderer.render(scene,camera);
}
requestAnimationFrame(loop);
document.getElementById("loading").style.display="none";
})();
</script>
